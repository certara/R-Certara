template:
  bootstrap: 5
  light-switch: true
  bslib:
    bootswatch: united
    pkgdown-navbar-bg: "#e95420"
    navbar-light-color: "#fff"
url: https://github.com/certara/R-Certara

reference:
  - title: Ecosystem
    desc: Attach the Certara pharmacometrics R suite and inspect its membership
    contents:
    - certara_attach
    - certara_packages
    - certara_core_packages
  - title: MCP setup and diagnostics
    desc: Configure, run, and troubleshoot the Certara MCP server
    contents:
    - write_mcp_config
    - remove_mcp_config
    - launch_certara_mcp
    - certara_session_status
    - list_certara_mcp_servers
    - list_certara_mcp_configs
  - title: Memory controls
    desc: Manage the local, opt-in memory used by Certara MCP tools
    contents:
    - enable_memory
    - disable_memory
    - list_memory_records
    - export_memory
    - delete_memory_record
    - clear_memory
  - title: Reports and outputs
    desc: Choose the project output location and render the accumulated report
    contents:
    - mcp_session_project_dir
    - render_certara_report

navbar:
  structure:
    left:  [home, reference, pml, articles, webinars, tutorials, resources, news]
    right: [search, github, lightswitch]
    navbar:
  components:
    home: ~
    pml:
      text: PML Library
      href: articles/pml_library.html
    articles:
      text: Certara R School
      href: articles/Certara_R_School.html
    webinars:
      text: Webinars
      href: articles/webinars.html
    tutorials:
      text: Tutorials
      menu:
      - text: RsNLME
        href: https://certara.shinyapps.io/Tutorial_RsNLME/
    resources:
      text: Resources
      href: articles/resources.html
    news:
      text: News
      href: articles/news.html
